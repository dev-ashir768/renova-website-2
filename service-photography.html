<script>
gsap.registerPlugin(ScrollTrigger);
(function(){const dot=document.createElement("div"),ring=document.createElement("div");dot.id="cursor-dot";ring.id="cursor-ring";Object.assign(dot.style,{position:"fixed",width:"6px",height:"6px",borderRadius:"50%",background:"#b8922a",pointerEvents:"none",zIndex:"9999",transform:"translate(-50%,-50%)",top:"0",left:"0"});Object.assign(ring.style,{position:"fixed",width:"32px",height:"32px",borderRadius:"50%",border:"1.5px solid rgba(184,146,42,0.5)",pointerEvents:"none",zIndex:"9998",transform:"translate(-50%,-50%)",top:"0",left:"0",transition:"width .3s,height .3s,border-color .3s"});document.body.appendChild(dot);document.body.appendChild(ring);let mx=0,my=0,rx=0,ry=0;document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;gsap.set(dot,{x:mx,y:my});});(function loop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;gsap.set(ring,{x:rx,y:ry});requestAnimationFrame(loop);})();document.querySelectorAll("a,button,.feat-card").forEach(el=>{el.addEventListener("mouseenter",()=>{ring.style.width="52px";ring.style.height="52px";ring.style.borderColor="rgba(184,146,42,0.9)";});el.addEventListener("mouseleave",()=>{ring.style.width="32px";ring.style.height="32px";ring.style.borderColor="rgba(184,146,42,0.5)";});});})();
